<!-- 1) მოიყვანეთ 3 რეალური მაგალითი, სადაც შეიძლება გამოვიყენოთ ვიდეო ვებსაიტზე -->
<!-- კინოს თრეილერი, რაიმე ტუტორიალი, რეკლამა -->

<!-- 2) მოიყვანეთ 3 რეალური მაგალითი, სადაც შეიძლება გამოვიყენოთ აუდიო -->
<!-- ღილაკის დაჭერის ხმა, მუსიკის მოსმენა,   -->

<!-- 3) შექმენით HTML გვერდი, სადაც ჩასვამთ ვიდეოს:
  მოთხოვნები:
  - გამოიყენეთ <video> ტეგი
  - დაამატეთ controls
  - გამოიყენეთ მინიმუმ 1 ვიდეო ფაილი (.mp4 ან .mov) -->

<html>

    <head>
        <title>hw</title>
    </head>

    <body>

        <h2>my video</h2>

        <video controls width="500">
            <source src="./assests/timer.mp4" type="video/mp4">
  
        </video>


        <!-- 4) შექმენით HTML გვერდი, სადაც ჩასვამთ აუდიოს:
        მოთხოვნები:
        - გამოიყენეთ <audio> ტეგი
        - დაამატეთ controls
        - გამოიყენეთ მინიმუმ 1 აუდიო ფაილი (.mp3) -->

        <audio controls >
            <source src="./assests/audio.mp3" type="audio/mp3">

        </audio>

        <!-- 5) შექმენით ვიდეო ან აუდიო ელემენტი, სადაც გამოიყენებთ <source> ტეგს:
        მოთხოვნები:
        - მინიმუმ 2 განსხვავებული ფორმატი (მაგ: mp4 + webm ან mp3 + ogg)
        - ახსენით რატომ ვიყენებთ `<source>` ტეგს
        -->
        <video controls>

            <source src="./assests/timer.mp4" type="video/mp4">
            <source src="./assests/timer.webm" type="video/webm">
        </video>



    </body>

</html>

<!-- 6) აქსენით შემდეგი ატრიბუტები: controls, autoplay, muted, loop -->
<!-- controls - აჩვენებს დაპაუზების/ჩართვის ღილაკს, autoplay - საიტზე შესვლისას ავტომატურად ირთვება, muted - უხმო, loop - ვიდეო ან აუდიო მეორდება -->
