<!-- 1) მოიყვანეთ 3 რეალური მაგალითი სადაც შეიძლება გამოვიყენოთ ტეგები (header, main, footer, section, article, aside) ვებსაიტზე.
მაგალითისთვის გაითვალისწინეთ სხვადასხვა ტიპის საიტები (ბლოგი, ონლაინ მაღაზია, ახალი ამბები და ა.შ.) -->

<!-- header - საიტის ლოგო და მენიუ, main - ძირითადი კონტენტი , ყველაზე მნიშვნელოვანი ინფორმაცია, footer - ემაილი, კოპირაითი(copyright), ლინკი, section -  -->


<!-- 2) განმარტეთ თითოეული ტეგის დანიშნულება:
- <header>
- <main>
- <footer>
- <section>
- <article>
- <aside> -->
<!-- <header> - არის გვერდის ზედა ნაწილი, <main> - მთავარი შინაარსია, <footer> - ქვედა ინფორმაციაა, <section> - შინაარსის ნაწილი,
<article> - დამოუკიდებელი ტექსტია,<aside> - გვერდითი დამატებითი ინფორმაციაა. -->

<!-- 3) შექმენით მარტივი ვებგვერდი, სადაც გამოიყენებთ:
 - header (საიტის სათაური და ნავიგაცია)
 - main (ძირითადი კონტენტი)
 - footer (საკონტაქტო ინფორმაცია)
  მოთხოვნები -> სათაურები, პარაგრაფები, ღილაკები, სურათები. -->

<html>

    <head>
        <title>თევზაობის საიტი</title>
    </head>
    <body>
        <header>
            <h1>თევზაობის სამყარო</h1>
            <nav>
                <button>მთავარი</button>
                <button>აღჭურვილობა</button>
                <button>ადგილები</button>
            </nav>
        </header>

        <main>
            <h2>კეთილი იყოს თქვენი მობრძანება</h2>
            <p>თევზაობა არის მშვიდი და საინტერესო ჰობი, რომელიც ბუნებასთან გაკავშირებს.</p>

            <img src="https://www.g3boats.com/wp-content/uploads/2025/01/10-Must-Visit-Fishing-Spots.jpg" alt="fishing image">
            <p>აქ შეგიძლიათ გაიგოთ საუკეთესო სათევზაო ადგილები და რჩევები</p>
            <button>დაიწყე სწავლა</button>
        </main>

        <footer>
            <p>კონტაქტი: narimanidzegoga489@email.com</p>
        </footer>
    </body>

</html>
