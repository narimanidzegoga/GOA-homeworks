<!-- 5) შექმენით გვერდი <aside> ტეგის გამოყენებით
მოთხოვნები:
  - main ნაწილში იყოს მთავარი ტექსტი
  - aside ში განათავსეთ დამატებითი ინფორმაცია (მაგ: რეკლამა, რჩევები, ფაქტები) -->
<html>
    <head>
        <title>ფეხბურთი</title>
    </head>
    <body>
        <header>
            <h1>ფეხბურთის სამყარო</h1>
        </header>

        <main>
            <h2>ფეხბურთი</h2>
            <p>ფეხბურთი არის გუნდური სპორტი, რომელიც ითამაშება 11 მოთამაშით თითო გუნდში.</p>
        </main>

        <aside>
            <h3>დამატებითი ინფორმაცია</h3>
            <p>რჩევა: კარგი ფეხბურთელი უნდა იყოს სწრაფი და ტექნიკური.</p>
            <p>ფაქტი: ფეხბურთი მსოფლიოში ყველაზე პოპულარული სპორტია.</p>
        </aside>
    </body>
</html>
